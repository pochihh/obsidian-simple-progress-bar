name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag/release to upload assets to (defaults to the pushed ref name)"
        required: false
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-release-assets:
    name: Build, upload, and attest release assets
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Verify release assets exist
        run: |
          test -s main.js
          test -s manifest.json
          test -s styles.css

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            main.js
            manifest.json
            styles.css

      - name: Attest generated build assets
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            styles.css
